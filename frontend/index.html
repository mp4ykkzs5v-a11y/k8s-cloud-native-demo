<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>K8S 云原生 Web 服务部署平台</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .container {
      width: 900px;
      margin: 60px auto;
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      color: #111827;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 30px;
    }

    .card {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      background: #fafafa;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #1d4ed8;
    }

    pre {
      background: #111827;
      color: #d1d5db;
      padding: 18px;
      border-radius: 8px;
      overflow-x: auto;
      min-height: 80px;
    }

    .tag {
      display: inline-block;
      background: #eef2ff;
      color: #3730a3;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      margin-right: 8px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>K8S 云原生 Web 服务部署平台</h1>
    <p class="subtitle">
      前端使用静态页面，后端使用 FastAPI。后续会通过 Docker Compose 和 Kubernetes 完成部署。
    </p>

    <div>
      <span class="tag">Dockerfile</span>
      <span class="tag">Docker Compose</span>
      <span class="tag">Kubernetes Deployment</span>
      <span class="tag">Service</span>
      <span class="tag">Ingress</span>
      <span class="tag">ConfigMap</span>
      <span class="tag">Secret</span>
      <span class="tag">HPA</span>
      <span class="tag">CronJob</span>
    </div>

    <div class="card">
      <h2>后端接口测试</h2>
      <p>点击按钮，请求 FastAPI 后端接口：</p>
      <button onclick="loadBackendInfo()">请求后端 /api/info</button>

      <h3>返回结果：</h3>
      <pre id="result">等待请求...</pre>
    </div>
  </div>

  <script>
    async function loadBackendInfo() {
      const resultBox = document.getElementById("result");
      resultBox.textContent = "请求中...";

      try {
        const response = await fetch("/api/info");
        const data = await response.json();
        resultBox.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        resultBox.textContent = "请求失败：\n" + error;
      }
    }
  </script>
</body>
</html>
