apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: k8s-demo
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: k8s-backend:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
